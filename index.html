<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="网页版扫雷游戏：支持难度选择、计时、插旗、首击安全和胜负判定。" />
  <title>经典扫雷 | 网页版</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="app" aria-label="网页版扫雷游戏">
    <section class="hero">
      <div>
        <p class="eyebrow">Minesweeper Web</p>
        <h1>经典扫雷</h1>
        <p class="subtitle">左键翻开，右键插旗；手机端可长按插旗。</p>
      </div>
      <button id="newGameHero" class="primary-btn" type="button">新游戏</button>
    </section>

    <section class="panel" aria-label="游戏控制区">
      <label class="field">
        <span>难度</span>
        <select id="difficulty" aria-label="选择难度">
          <option value="easy">简单 9×9 / 10雷</option>
          <option value="medium">中等 16×16 / 40雷</option>
          <option value="hard">困难 16×30 / 99雷</option>
        </select>
      </label>

      <div class="stats" aria-live="polite">
        <div class="stat-card">
          <span class="stat-label">剩余地雷</span>
          <strong id="mineLeft">10</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">时间</span>
          <strong id="timer">00:00</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">最佳</span>
          <strong id="bestTime">--:--</strong>
        </div>
      </div>

      <div class="actions">
        <button id="newGame" type="button">重新开始</button>
        <button id="hint" type="button">玩法说明</button>
      </div>
    </section>

    <section class="game-shell">
      <div id="status" class="status" role="status">点击任意格子开始游戏</div>
      <div id="board" class="board" aria-label="扫雷棋盘"></div>
    </section>

    <dialog id="helpDialog">
      <h2>玩法说明</h2>
      <p>目标是在不踩到地雷的情况下翻开所有安全格子。</p>
      <ul>
        <li>电脑：左键翻开，右键插旗。</li>
        <li>手机或平板：点击翻开，长按插旗。</li>
        <li>第一次点击不会踩雷。</li>
      </ul>
      <button id="closeHelp" class="primary-btn" type="button">知道了</button>
    </dialog>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
